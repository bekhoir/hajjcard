<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> طاقة تهنئة عيد  الأضحى  | BKHR Generation</title>

  <!-- Arabic Sans Serif Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      width: 100%;
      overflow-x: hidden;
    }

    .header {
      background: #fff;
      width: 100%;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,.15);
    }

    .header img {
      height: 55px;
    }

    .container {
      flex: 1;
      width: 100%;
      max-width: 420px;
      padding: 25px;
      text-align: center;
      margin: 0 auto;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #FFD700;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 30px;
      border: none;
      font-size: 15px;
      margin-bottom: 20px;
      text-align: center;
      outline: none;
    }

    canvas {
      width: 100%;
      border-radius: 18px;
      margin-bottom: 20px;
      background: #fff;
      box-shadow: 0 8px 15px rgba(0,0,0,.25);
  height: auto;
  max-width: 100%;
  display: block;
    }

    button {
      background: #FFD700;
      color: #333;
      border: none;
      padding: 12px 22px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: .3s;
    }

    button:hover {
      background: #ffcc00;
    }

    .footer {
      font-size: 13px;
      padding: 15px;
      opacity: .85;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="logo.png" alt="شعار BKHR">
  </div>

  <div class="container">
    <div class="title">بطاقة تهنئة عيد  الأضحى  ١٤٤٧ ه </div>

    <input
      type="text"
      id="name"
      placeholder="اكتب اسمك هنا"
      oninput="updateCanvas()"
    >

    <canvas id="canvas"></canvas>

    <button onclick="downloadImage()">تحميل البطاقة</button>
  </div>

  <div class="footer">
     BKHR Generation 2025 ©
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 720;
    canvas.height = 1280;

    const img = new Image();
    img.src = "card2.jpg"; // صورة الخلفية

    img.onload = function () {
      drawBase();
    };

    function drawBase() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    function updateCanvas() {
      drawBase();

      const name = document.getElementById("name").value;
      if (!name) return;

      ctx.textAlign = "center";
      ctx.direction = "rtl";
      ctx.fillStyle = "#786956";
      ctx.font = "700 30px Cairo";

      // موقع الاسم (يمكن تعديله)
      ctx.fillText(name, canvas.width / 2, 810);
    }

    function downloadImage() {
      const link = document.createElement("a");
      link.download = "hajj1447.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
