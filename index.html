<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>اختر بطاقتك | BKHR Generation</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Cairo', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      overflow-x: hidden;
    }

    .header {
      background: #fff;
      width: 100%;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,.15);
    }

    .header img {
      height: 55px;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      padding: 30px 20px 50px;
      text-align: center;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      color: #FFD700;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 15px;
      opacity: .9;
      margin-bottom: 35px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
    }

    .card-item {
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 20px rgba(0,0,0,.25);
      transition: .3s ease;
      border: 1px solid rgba(255,255,255,.15);
    }

    .card-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 25px rgba(0,0,0,.35);
    }

    .card-item img {
      width: 100%;
      border-radius: 18px;
      margin-bottom: 20px;
      background: #fff;
      box-shadow: 0 8px 15px rgba(0,0,0,.25);
  height: auto;
  max-width: 100%;
  display: block;
    }

    .card-content {
      padding: 18px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #FFD700;
    }

    .card-desc {
      font-size: 14px;
      line-height: 1.8;
      opacity: .9;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      background: #FFD700;
      color: #333;
      padding: 11px 22px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 700;
      transition: .3s;
    }

    .btn:hover {
      background: #ffcc00;
    }

    .footer {
      font-size: 13px;
      padding: 18px;
      opacity: .85;
      text-align: center;
    }

    @media(max-width:600px){
      .title{
        font-size:24px;
      }

      .card-item img {
        height: 280px;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <img src="logo.png" alt="BKHR Logo">
  </div>

  <div class="container">
    <div class="title">اختر بطاقة التهنئة</div>
    <div class="subtitle">
      اختر التصميم الذي يناسبك ثم ابدأ بكتابة اسمك وتحميل البطاقة مباشرة
    </div>

    <div class="cards-grid">

      <div class="card-item">
        <img src="card1.png" alt="بطاقة 1">
        <div class="card-content">
          <a href="card1.html" class="btn">اختيار البطاقة</a>
        </div>
      </div>

      <div class="card-item">
        <img src="card2.jpg" alt="بطاقة 2">
        <div class="card-content">
          <a href="card2.html" class="btn">اختيار البطاقة</a>
        </div>
      </div>


    </div>
  </div>

  <div class="footer">
    BKHR Generation 2025 ©
  </div>

</body>
</html>
